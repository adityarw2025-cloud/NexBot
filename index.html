<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexBot — AI Chat Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
            <path d="M8 12h8M8 8h5M8 16h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="logo-text">NexBot</span>
      </div>
      <button class="sidebar-toggle" id="sidebarToggle" title="Collapse sidebar">
        <svg viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <button class="new-chat-btn" id="newChatBtn">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <span>New Chat</span>
    </button>

    <div class="sidebar-section-label">Recent Chats</div>
    <!-- History items are injected dynamically by script.js -->
    <ul class="chat-history" id="chatHistory">
      <li class="history-empty" id="historyEmpty">No chats yet</li>
    </ul>

    <div class="sidebar-footer">
      <div class="user-card">
        <div class="avatar">AK</div>
        <div class="user-info">
          <p class="user-name">Aditya warade</p>
          <p class="user-plan">Free Plan</p>
        </div>
        <button class="settings-btn" title="Settings">
          <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main" id="main">

    <!-- TOP NAV -->
    <header class="topbar">
      <button class="menu-btn" id="menuBtn" title="Open sidebar">
        <svg viewBox="0 0 24 24" fill="none"><path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <div class="topbar-title">AI Chat Assistant</div>
      <div class="topbar-actions">
        <button class="icon-btn" id="themeToggle" title="Toggle theme">
          <svg class="sun-icon" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="1.5"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <svg class="moon-icon" viewBox="0 0 24 24" fill="none"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="icon-btn" title="Clear chat" id="clearChatBtn">
          <svg viewBox="0 0 24 24" fill="none"><polyline points="3 6 5 6 21 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </header>

    <!-- CHAT AREA -->
    <section class="chat-area" id="chatArea">

      <!-- Welcome screen (shown when no messages) -->
      <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-glow"></div>
        <div class="welcome-icon">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="2"/>
            <path d="M16 24h16M16 18h10M16 30h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <h1 class="welcome-title">Hello, I'm NexBot</h1>
        <p class="welcome-subtitle">Your intelligent AI assistant. Ask me anything.</p>
        <div class="suggestion-chips">
          <button class="chip" data-prompt="Explain quantum computing simply">⚛️ Explain quantum computing</button>
          <button class="chip" data-prompt="Write a Python function to reverse a string">🐍 Python: reverse a string</button>
          <button class="chip" data-prompt="Give me 5 healthy meal ideas for the week">🥗 Healthy meal ideas</button>
          <button class="chip" data-prompt="What are some tips to improve productivity?">🚀 Productivity tips</button>
        </div>
      </div>

      <!-- Messages container -->
      <div class="messages" id="messages"></div>

    </section>

    <!-- INPUT AREA -->
    <footer class="input-area">
      <div class="input-box">
        <button class="attach-btn icon-btn" title="Attach file">
          <svg viewBox="0 0 24 24" fill="none"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66L9.41 17.41a2 2 0 01-2.83-2.83l8.49-8.48" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <textarea
          id="userInput"
          class="user-input"
          placeholder="Message NexBot…"
          rows="1"
          autocomplete="off"
        ></textarea>
        <button class="send-btn" id="sendBtn" title="Send message" disabled>
          <svg viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2L15 22 11 13 2 9l20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <p class="disclaimer">NexBot can make mistakes. Verify important information.</p>
    </footer>

  </main>

  <script src="{{ url_for('static', filename='index.js') }}"></script>
</body>
</html>
